<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>eggframe</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<header class="app-header">
  <div class="logo"><span>🥚</span><span class="logo-text">eggframe</span></div>
  <button id="btn-export" class="btn btn-primary">PNG 저장</button>
</header>

<!-- GALLERY BAR -->
<section class="gallery-bar">
  <div class="gallery-list" id="gallery-list"><span class="gallery-empty">저장된 편집본 없음</span></div>
  <div class="gallery-controls">
    <span class="opt-label">크기</span>
    <input type="range" id="gallery-size" min="48" max="120" value="68" class="slider-sm" />
    <button id="btn-select-all" class="btn btn-ghost btn-sm">전체선택</button>
    <button id="btn-dl-selected" class="btn btn-secondary btn-sm">⬇ 선택 내려받기</button>
  </div>
</section>

<!-- WORKSPACE: 3 columns -->
<main class="workspace">

  <!-- LEFT: 원본 이미지 -->
  <aside class="panel panel-photos">
    <div class="panel-header">
      <span class="panel-title">원본 이미지</span>
      <label class="btn btn-ghost btn-sm" for="file-input">+ 추가</label>
      <input type="file" id="file-input" accept="image/*" multiple hidden />
    </div>
    <div class="drop-zone" id="drop-zone">
      <span class="drop-icon">🖼️</span><p>드래그 또는 클릭</p>
    </div>
    <div class="photo-list" id="photo-list"></div>
  </aside>

  <!-- MIDDLE: 옵션 -->
  <aside class="panel panel-options">
    <div class="panel-header"><span class="panel-title">레이아웃 &amp; 옵션</span></div>
    <div class="options-body">
      <div class="opt-group">
        <span class="opt-label">사진 장수</span>
        <div class="count-ctrl">
          <button id="count-minus" class="btn-count">−</button>
          <span id="count-val">1</span>장
          <button id="count-plus" class="btn-count">+</button>
        </div>
      </div>
      <div class="opt-group">
        <span class="opt-label">맞춤 레이아웃</span>
        <div class="layout-picker" id="layout-picker"></div>
      </div>
      <div class="opt-group">
        <span class="opt-label">여백</span>
        <div class="gap-btns" id="gap-btns">
          <button class="gap-btn active" data-gap="0">없음</button>
          <button class="gap-btn" data-gap="8">좁게</button>
          <button class="gap-btn" data-gap="16">보통</button>
          <button class="gap-btn" data-gap="28">넓게</button>
        </div>
      </div>
      <div class="opt-group">
        <span class="opt-label">배경색</span>
        <div class="bg-swatches">
          <button class="swatch active" data-color="#FFFFFF" style="background:#FFFFFF"></button>
          <button class="swatch" data-color="#000000" style="background:#000000"></button>
          <button class="swatch" data-color="#F5F4F0" style="background:#F5F4F0"></button>
          <button class="swatch" data-color="#A8D4EC" style="background:#A8D4EC"></button>
          <button class="swatch" data-color="#2D8C7A" style="background:#2D8C7A"></button>
          <button class="swatch" data-color="#E8A020" style="background:#E8A020"></button>
          <button class="swatch" data-color="#4A4A52" style="background:#4A4A52"></button>
          <input type="color" id="bg-color" class="swatch swatch-custom" value="#F5F4F0" />
        </div>
      </div>
      <div class="opt-group">
        <span class="opt-label">비율 (세로)</span>
        <div class="ratio-btns" id="ratio-v">
          <button class="ratio-btn active" data-ratio="1:1">1:1</button>
          <button class="ratio-btn" data-ratio="4:5">4:5</button>
          <button class="ratio-btn" data-ratio="3:4">3:4</button>
          <button class="ratio-btn" data-ratio="9:16">9:16</button>
        </div>
      </div>
      <div class="opt-group">
        <span class="opt-label">비율 (가로)</span>
        <div class="ratio-btns" id="ratio-h">
          <button class="ratio-btn" data-ratio="16:9">16:9</button>
          <button class="ratio-btn" data-ratio="5:4">5:4</button>
          <button class="ratio-btn" data-ratio="4:3">4:3</button>
          <button class="ratio-btn" data-ratio="3:2">3:2</button>
        </div>
      </div>
    </div>
    <button id="btn-save" class="btn btn-primary btn-full">📌 편집본 임시저장하기</button>
  </aside>

  <!-- RIGHT: 캔버스 -->
  <section class="canvas-area">
    <div class="canvas-header">
      <span class="canvas-title">미리보기</span>
      <button id="btn-dl-canvas" class="btn btn-secondary btn-sm">⬇ 내려받기</button>
    </div>
    <div class="canvas-wrapper" id="canvas-wrapper">
      <div class="canvas-frame" id="canvas-frame">
        <canvas id="mosaic-canvas" class="mosaic-overlay"></canvas>
      </div>
    </div>
    <div class="canvas-toolbar-bottom">
      <span class="opt-label">모자이크</span>
      <button class="tool-btn active" data-tool="rect">□ 사각형</button>
      <button class="tool-btn" data-tool="circle">○ 원형</button>
      <button class="tool-btn" data-tool="select">↖ 선택</button>
      <button id="mosaic-clear" class="btn btn-ghost btn-sm">× 전체삭제</button>
      <span class="toolbar-divider"></span>
      <label class="wm-label">
        <input type="checkbox" id="wm-toggle" />
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
        🐧 워터마크
      </label>
      <input type="color" id="wm-color" value="#ffffff" class="color-picker-sm" />
      <input type="range" id="wm-opacity" min="10" max="100" value="30" class="slider-sm" />
      <span id="wm-opacity-val" class="mono">30%</span>
    </div>
  </section>
</main>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" hidden>
  <div class="lightbox-backdrop" id="lb-backdrop"></div>
  <div class="lightbox-ui">
    <div class="lb-toolbar">
      <span class="lb-counter" id="lb-counter">1 / 1</span>
      <div class="lb-right">
        <input type="range" id="lb-zoom" min="50" max="300" value="100" class="slider-sm" />
        <button id="lb-download" class="btn-icon">⬇️</button>
        <button id="lb-heart" class="btn-icon">🤍</button>
        <button id="lb-delete" class="btn-icon">🗑️</button>
        <button id="lb-close" class="btn-icon">✕</button>
      </div>
    </div>
    <div class="lb-viewer" id="lb-viewer">
      <button class="lb-nav lb-prev" id="lb-prev">‹</button>
      <div class="lb-image-wrap"><img id="lb-img" src="" alt="" /></div>
      <button class="lb-nav lb-next" id="lb-next">›</button>
    </div>
    <div class="lb-filmstrip" id="lb-filmstrip"></div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
